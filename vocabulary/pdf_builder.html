<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrenamiento: Primeros Pasos</title>
    <style>
        /* Base Screen Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #222;
            background-color: #525659;
            margin: 0;
            padding: 20px;
        }
        
        /* Forces strictly 8.5 x 11 Portrait with tighter 0.5in margins */
        .page {
            background: white;
            width: 8.5in;
            height: 11in; 
            margin: 0 auto 20px auto;
            padding: 0.5in;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        
        h1 { border-bottom: 3px solid #2c3e50; padding-bottom: 5px; color: #2c3e50; font-size: 22px; margin-top: 0; margin-bottom: 10px;}
        h2 { color: #e67e22; margin-top: 0px; margin-bottom: 5px; font-size: 18px; text-transform: uppercase; }
        h3 { font-size: 15px; margin-bottom: 8px; margin-top: 15px; color: #34495e; border-bottom: 1px solid #eee; padding-bottom: 3px;}
        .category-header { font-size: 14px; color: #e67e22; border-bottom: 1px dashed #ccc; margin-top: 15px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .instructions { font-style: italic; color: #555; margin-bottom: 15px; font-size: 13px; margin-top: 0; line-height: 1.4;}
        
        /* Two Column Layouts */
        .two-col { display: flex; justify-content: space-between; font-size: 13.5px; align-items: flex-start; }
        .col { width: 48%; list-style-type: none; padding: 0; margin-top: 0;}
        
        /* Specific tweaks for matching and lists */
        .match-col li { margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 4px; font-size: 13px;}
        .translation-col li { margin-bottom: 12px; font-size: 13.5px; }
        
        /* Specific tweaks for Vocab List */
        .vocab-col { margin-bottom: 0; }
        .vocab-col li { margin-bottom: 10px; font-size: 12.5px; line-height: 1.4;}
        
        .blank-line { display: inline-block; width: 120px; border-bottom: 1px solid #222; margin: 0 5px; }
        .blank-line-long { display: inline-block; width: 100%; border-bottom: 1px solid #222; margin-top: 4px; }
        .blank-line-med { display: inline-block; width: 200px; border-bottom: 1px solid #222; margin: 0 5px; }
        
        /* Fixed Cardio Spacing */
        .cardio-item { margin-bottom: 14px; font-size: 13.5px; line-height: 1.4;}
        .cardio-line-container { margin-top: 6px; margin-bottom: 0px; width: 70%;} 
        
        .word-bank { background: #ecf0f1; padding: 8px; text-align: center; font-weight: bold; font-size: 13px; margin-bottom: 15px; border-radius: 5px; line-height: 1.4;}
        
        .question-item { margin-bottom: 12px; font-size: 13.5px; line-height: 1.4;}

        .checkbox-item { display: flex; align-items: center; margin-bottom: 10px; font-size: 14px; }
        .checkbox-item input { margin-right: 10px; transform: scale(1.1); }
        .prove-it { margin-left: 25px; margin-bottom: 20px; font-size: 13.5px; color: #555;}
        
        /* Dialogue Styles */
        .dialogue-line { margin-bottom: 15px; font-size: 14px; line-height: 1.6;}
        .speaker { font-weight: bold; color: #2c3e50; margin-right: 10px;}

        /* Answer Key Styles */
        .key-section { margin-bottom: 15px; font-size: 12px; line-height: 1.4;}
        .key-section h3 { margin: 5px 0; color: #c0392b; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 2px;}

        /* Print Override */
        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            @page { size: letter portrait; margin: 0; }
            .page { box-shadow: none; margin: 0; page-break-after: always; height: 100vh; }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // Utility Function: Shuffle Arrays
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Expanded JSON Data with Extra Sentences and Scaffolded Clues
        const data = {
            "programa": "Primeros Pasos",
            "set_numero": 1,
            "preparate": [
                { "es": "Hola", "en": "Hello; Hi", "contexto": "¡Hola! Me llamo María.", "categoria": "Saludos" },
                { "es": "Buenos días", "en": "Good morning", "contexto": "Buenos días, profesor.", "categoria": "Saludos" },
                { "es": "Buenas tardes", "en": "Good afternoon", "contexto": "Buenas tardes, ¿cómo están?", "categoria": "Saludos" },
                { "es": "Buenas noches", "en": "Good evening; Good night", "contexto": "Ya es tarde. Buenas noches, mamá.", "categoria": "Saludos" },
                { "es": "¿Qué tal?", "en": "How are you?; How is it going?", "contexto": "¡Hola, amigo! ¿Qué tal?", "categoria": "Conversación" },
                { "es": "¿Qué pasa?", "en": "What’s happening?; What’s going on?", "contexto": "Hay muchas personas aquí, ¿qué pasa?", "categoria": "Conversación" },
                { "es": "¿Qué hay de nuevo?", "en": "What’s new?", "contexto": "No te veo desde el verano. ¿Qué hay de nuevo?", "categoria": "Conversación" },
                { "es": "Nada", "en": "Nothing", "contexto": "No pasa nada.", "categoria": "Conversación" },
                { "es": "Bien", "en": "Well; Fine", "contexto": "Estoy muy bien, gracias.", "categoria": "Conversación" },
                { "es": "Regular", "en": "So-so; OK", "contexto": "Hoy no estoy muy bien, estoy regular.", "categoria": "Conversación" },
                { "es": "Adiós", "en": "Goodbye", "contexto": "La clase terminó. ¡Adiós!", "categoria": "Despedidas" },
                { "es": "Chau", "en": "Bye", "contexto": "Chau, nos vemos en la cafetería.", "categoria": "Despedidas" },
                { "es": "Hasta luego", "en": "See you later", "contexto": "Me voy a mi casa, ¡hasta luego!", "categoria": "Despedidas" },
                { "es": "Hasta pronto", "en": "See you soon", "contexto": "Nos vemos en un minuto. ¡Hasta pronto!", "categoria": "Despedidas" },
                { "es": "Hasta mañana", "en": "See you tomorrow", "contexto": "Es el fin del día escolar, ¡hasta mañana!", "categoria": "Despedidas" },
                { "es": "Nos vemos", "en": "See you", "contexto": "Nos vemos en el partido de fútbol.", "categoria": "Despedidas" },
                { "es": "Por favor", "en": "Please", "contexto": "Necesito un lápiz, por favor.", "categoria": "Cortesía" },
                { "es": "Gracias", "en": "Thank you", "contexto": "Gracias por tu ayuda.", "categoria": "Cortesía" },
                { "es": "De nada", "en": "You’re welcome", "contexto": "—Gracias por el libro. —De nada.", "categoria": "Cortesía" },
                { "es": "Con permiso", "en": "Excuse me (to pass)", "contexto": "Con permiso, necesito pasar por la puerta.", "categoria": "Cortesía" },
                { "es": "Perdón", "en": "Pardon me; Excuse me", "contexto": "Perdón, ¿qué hora es?", "categoria": "Cortesía" },
                { "es": "Lo siento", "en": "I’m sorry", "contexto": "Lo siento, no tengo mi tarea hoy.", "categoria": "Cortesía" }
            ],
            "cardio": [
                { "clue_en": "You say this to your teacher when you walk into class at 8:00 AM.", "respuesta": "Buenos días" },
                { "clue_en": "The polite phrase you must use when you need to walk past someone in a crowded hallway.", "respuesta": "Con permiso" },
                { "clue_en": "You say this to your friend when you will see them the very next school day.", "respuesta": "Hasta mañana" },
                { "clue_en": "The best response when someone asks you '¿Qué pasa?' and there is nothing going on.", "respuesta": "Nada" },
                { "clue_en": "You say this when you step on someone's foot by accident.", "respuesta": "Lo siento / Perdón" },
                { "clue_en": "A quick, informal way to ask your friend 'How is it going?'.", "respuesta": "¿Qué tal?" },
                { "clue_en": "You say this to ask for a favor politely.", "respuesta": "Por favor" },
                { "clue_en": "You say this when you are doing perfectly fine.", "respuesta": "Bien" },
                { "clue_es": "Lo que dices por la noche antes de dormir <em>(before sleeping)</em>.", "respuesta": "Buenas noches" },
                { "clue_es": "La respuesta educada <em>(polite response)</em> cuando una persona te dice 'gracias'.", "respuesta": "De nada" },
                { "clue_es": "Una palabra corta e informal <em>(short and informal)</em> para decir 'adiós' a tus amigos.", "respuesta": "Chau" },
                { "clue_es": "La palabra universal para saludar <em>(to greet)</em> a una persona.", "respuesta": "Hola" },
                { "clue_es": "Lo que dices cuando quieres saber si hay información nueva <em>(new information)</em> en la vida de tu amigo.", "respuesta": "¿Qué hay de nuevo?" },
                { "clue_es": "Una expresión de despedida cuando vas a ver a la persona más tarde <em>(later)</em> en el mismo día.", "respuesta": "Hasta luego" },
                { "clue_es": "El estado de ánimo <em>(mood)</em> cuando no estás bien, pero tampoco estás muy mal.", "respuesta": "Regular" },
                { "clue_es": "Lo que dices a tu maestro a las 2 de la tarde <em>(in the afternoon)</em>.", "respuesta": "Buenas tardes" }
            ],
            "levantar_pesas": [
                { "oracion": "¡[target], profesor! ¿Cómo está usted esta mañana?", "target": "Buenos días", "hint": "Good morning" },
                { "oracion": "— Aquí tienes tu diccionario de español. — ¡[target] por el diccionario!", "target": "Gracias", "hint": "Thank you" },
                { "oracion": "No tengo mi tarea de español hoy. ¡[target]!", "target": "Lo siento", "hint": "I'm sorry" },
                { "oracion": "Hay muchas personas en el pasillo. [target], necesito pasar.", "target": "Con permiso", "hint": "Excuse me" },
                { "oracion": "Estoy muy [target] hoy porque no tengo exámenes.", "target": "bien", "hint": "well/fine" },
                { "oracion": "La clase terminó y me voy a mi casa. ¡[target]!", "target": "Adiós", "hint": "Goodbye" },
                { "oracion": "¿[target], amigo? Hace mucho tiempo que no te veo.", "target": "¿Qué hay de nuevo?", "hint": "What's new?" },
                { "oracion": "Hoy estoy enfermo, me duele la cabeza. Estoy [target].", "target": "regular", "hint": "so-so / ok" },
                { "oracion": "Me voy a dormir. ¡[target] mamá!", "target": "Buenas noches", "hint": "Good night" },
                { "oracion": "Necesito un lápiz para el examen, [target].", "target": "por favor", "hint": "please" },
                { "oracion": "¡[target]! Me llamo Carlos, ¿cómo te llamas?", "target": "Hola", "hint": "Hello" },
                { "oracion": "No pasa [target], todo está muy tranquilo aquí.", "target": "nada", "hint": "nothing" },
                { "oracion": "Son las 3:00 de la tarde. ¡[target] a todos!", "target": "Buenas tardes", "hint": "Good afternoon" },
                { "oracion": "Hasta [target], nos vemos en la clase de matemáticas mañana.", "target": "mañana", "hint": "tomorrow" },
                { "oracion": "¡[target]! Nos vemos el lunes en la escuela.", "target": "Chau", "hint": "Bye" },
                { "oracion": "— ¿Quieres más jugo? — No, [target].", "target": "gracias", "hint": "thank you" },
                { "oracion": "Paso por aquí, [target].", "target": "con permiso", "hint": "excuse me" },
                { "oracion": "Son las ocho de la mañana. ¡[target]!", "target": "Buenos días", "hint": "Good morning" },
                { "oracion": "— Hola, ¿[target]? — Todo bien, gracias.", "target": "Qué tal", "hint": "How are you" },
                { "oracion": "Es la hora de almorzar. ¡[target], chicos!", "target": "Buenas tardes", "hint": "Good afternoon" }
            ],
            "estiramiento": [
                { "cando": "greet my teacher when I walk into class in the morning.", "respuesta": "Buenos días" },
                { "cando": "politely ask someone to move out of the way in the hallway.", "respuesta": "Con permiso" },
                { "cando": "apologize if I accidentally make a mistake.", "respuesta": "Perdón / Lo siento" },
                { "cando": "say goodbye to my friends when I am going to see them the next day.", "respuesta": "Hasta mañana" },
                { "cando": "tell someone that things are going 'just okay' or 'so-so'.", "respuesta": "Regular" },
                { "cando": "ask my friend 'what's new?' when I haven't seen them in a while.", "respuesta": "¿Qué hay de nuevo?" }
            ],
            "profundiza": [
                { "speaker": "Sofía", "frase": "¡ [target1], Mateo! ¿ [target2] ?", "respuestas": ["Hola", "¿Qué tal?"] },
                { "speaker": "Mateo", "frase": "¡Hola, Sofía! Estoy [target3] , ¿y tú?", "respuestas": ["bien"] },
                { "speaker": "Sofía", "frase": "Estoy muy bien, [target4]. ¿ [target5] en la escuela hoy?", "respuestas": ["gracias", "¿Qué pasa?"] },
                { "speaker": "Mateo", "frase": "No pasa [target6]. Todo es normal.", "respuestas": ["nada"] },
                { "speaker": "Sofía", "frase": "Oh, ¡necesito ir a la clase de matemáticas! [target7], necesito pasar.", "respuestas": ["Con permiso"] },
                { "speaker": "Mateo", "frase": "No hay problema. ¡ [target8] en la cafetería para el almuerzo!", "respuestas": ["Nos vemos"] },
                { "speaker": "Sofía", "frase": "Sí, ¡ [target9] !", "respuestas": ["Hasta luego"] }
            ]
        };

        const app = document.getElementById('app');
        let html = '';
        let answerKey = ''; 

        const headerTitle = `Entrenamiento: ${data.programa} (Set ${data.set_numero})`;

        // ==========================================
        // PÁGINA 1: PREPÁRATE
        // ==========================================
        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>Prepárate</h2>
                <p class="instructions"><strong>Repasa tu lista de vocabulario y las oraciones de contexto antes de empezar.</strong><br>(Review your vocabulary list and the context sentences before you start.)</p>
                <div class="two-col">
        `;
        
        const categories = {};
        data.preparate.forEach(item => {
            if (!categories[item.categoria]) categories[item.categoria] = [];
            categories[item.categoria].push(item);
        });

        const categoryNames = Object.keys(categories);
        const col1Cats = categoryNames.slice(0, Math.ceil(categoryNames.length / 2));
        const col2Cats = categoryNames.slice(Math.ceil(categoryNames.length / 2));

        html += `<ul class="col vocab-col">`;
        col1Cats.forEach(cat => {
            html += `<div class="category-header">${cat}</div>`;
            categories[cat].forEach(item => {
                html += `<li><strong>${item.es}</strong> <em>(${item.en})</em><br><span style="color:#555;">${item.contexto}</span></li>`;
            });
        });
        html += `</ul>`;

        html += `<ul class="col vocab-col">`;
        col2Cats.forEach(cat => {
            html += `<div class="category-header">${cat}</div>`;
            categories[cat].forEach(item => {
                html += `<li><strong>${item.es}</strong> <em>(${item.en})</em><br><span style="color:#555;">${item.contexto}</span></li>`;
            });
        });
        html += `</ul></div></div>`;


        // ==========================================
        // PÁGINA 2: EL CALENTAMIENTO
        // ==========================================
        const vocabSample = shuffleArray(data.preparate).slice(0, 20); 
        const partA = vocabSample.slice(0, 10);
        const partB = vocabSample.slice(10, 20);
        
        const partA_EnglishShuffled = shuffleArray(partA);
        const lettersA = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>El Calentamiento</h2>
                
                <h3>Parte A: Relacionar (Matching)</h3>
                <p class="instructions" style="margin-top:-5px;"><strong>Relaciona las palabras en español con sus traducciones al inglés.</strong><br>(Match the Spanish words to their English translations.)</p>
                <div class="two-col">
                    <ul class="col match-col">
        `;
        let keyPartA = [];
        partA.forEach((item, index) => {
            html += `<li>___ ${index + 1}. ${item.es}</li>`;
            let correctLetterIndex = partA_EnglishShuffled.findIndex(e => e.en === item.en);
            keyPartA.push(`${index + 1}. ${lettersA[correctLetterIndex]}`);
        });
        html += `</ul><ul class="col match-col" style="list-style-type:none;">`;
        partA_EnglishShuffled.forEach((item, index) => {
            html += `<li><strong>${lettersA[index]}.</strong> ${item.en}</li>`;
        });
        html += `</ul></div>`;

        html += `
                <br>
                <h3>Parte B: Traducción</h3>
                <p class="instructions" style="margin-top:-5px;"><strong>Traduce las palabras del inglés al español.</strong><br>(Translate the English words into Spanish.)</p>
                <div class="two-col">
                    <ul class="col translation-col" style="list-style-type:none;">
        `;
        let keyPartB = [];
        partB.slice(0, 5).forEach((item, index) => {
            html += `<li><strong>${index + 11}.</strong> ${item.en} <div class="blank-line-long"></div></li>`;
            keyPartB.push(`${index + 11}. ${item.es}`);
        });
        html += `</ul><ul class="col translation-col" style="list-style-type:none;">`;
        partB.slice(5, 10).forEach((item, index) => {
            html += `<li><strong>${index + 16}.</strong> ${item.en} <div class="blank-line-long"></div></li>`;
            keyPartB.push(`${index + 16}. ${item.es}`);
        });
        html += `</ul></div></div>`;

        answerKey += `
            <div class="key-section">
                <h3>El Calentamiento</h3>
                <strong>Parte A:</strong> ${keyPartA.join(" | ")}<br>
                <strong>Parte B:</strong> ${keyPartB.join(" | ")}
            </div>
        `;


        // ==========================================
        // PÁGINA 3: EL CARDIO
        // ==========================================
        const cardioEN = shuffleArray(data.cardio.filter(c => c.clue_en)).slice(0, 7);
        const cardioES = shuffleArray(data.cardio.filter(c => c.clue_es)).slice(0, 7);

        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>El Cardio</h2>
                <p class="instructions"><strong>Lee las pistas y escribe la palabra correcta en español.</strong><br>(Read the clues and write the correct Spanish word.)</p>
                
                <h3>Parte A: Pistas en Inglés</h3>
        `;
        let keyCardioA = [];
        cardioEN.forEach((item, index) => {
            html += `
                <div class="cardio-item">
                    <strong>${index + 1}.</strong> ${item.clue_en}
                    <div class="cardio-line-container"><span class="blank-line-long"></span></div>
                </div>`;
            keyCardioA.push(`${index + 1}. ${item.respuesta}`);
        });

        html += `<h3>Parte B: Pistas en Español</h3>`;
        let keyCardioB = [];
        cardioES.forEach((item, index) => {
            html += `
                <div class="cardio-item">
                    <strong>${index + 8}.</strong> ${item.clue_es}
                    <div class="cardio-line-container"><span class="blank-line-long"></span></div>
                </div>`;
            keyCardioB.push(`${index + 8}. ${item.respuesta}`);
        });

        html += `</div>`;
        
        answerKey += `
            <div class="key-section">
                <h3>El Cardio</h3>
                <strong>Parte A:</strong> ${keyCardioA.join(" | ")}<br>
                <strong>Parte B:</strong> ${keyCardioB.join(" | ")}
            </div>
        `;


        // ==========================================
        // PÁGINA 4: LEVANTAR PESAS
        // ==========================================
        const pesasSet = shuffleArray(data.levantar_pesas).slice(0, 18);
        const pesasA = pesasSet.slice(0, 9);
        const pesasB = pesasSet.slice(9, 18);
        
        let bankA = shuffleArray(pesasA.map(i => i.target)).join(" &nbsp;&nbsp;|&nbsp;&nbsp; ");
        let bankB = shuffleArray(pesasB.map(i => i.target)).join(" &nbsp;&nbsp;|&nbsp;&nbsp; ");

        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>Levantar Pesas</h2>
                <p class="instructions"><strong>Llena los espacios en blanco usando el banco de palabras. Usa las pistas de contexto.</strong><br>(Fill in the blanks using the word banks. Use context clues.)</p>
                
                <h3>Ejercicio A</h3>
                <div class="word-bank">${bankA}</div>
                <ol style="margin-top:0; padding-left:20px;">
        `;
        let keyPesasA = [];
        pesasA.forEach((item, index) => {
            let sentence = item.oracion.replace(/\[target\]/g, `<span class="blank-line-med"></span>`);
            html += `<li class="question-item">${sentence} <em>(${item.hint})</em></li>`;
            keyPesasA.push(`${index + 1}. ${item.target}`);
        });
        html += `</ol>`;

        html += `
                <h3>Ejercicio B</h3>
                <div class="word-bank">${bankB}</div>
                <ol start="10" style="margin-top:0; padding-left:20px;">
        `;
        let keyPesasB = [];
        pesasB.forEach((item, index) => {
            let sentence = item.oracion.replace(/\[target\]/g, `<span class="blank-line-med"></span>`);
            html += `<li class="question-item">${sentence} <em>(${item.hint})</em></li>`;
            keyPesasB.push(`${index + 10}. ${item.target}`);
        });
        html += `</ol></div>`;

        answerKey += `
            <div class="key-section">
                <h3>Levantar Pesas</h3>
                <strong>Ej A:</strong> ${keyPesasA.join(" | ")}<br>
                <strong>Ej B:</strong> ${keyPesasB.join(" | ")}
            </div>
        `;


        // ==========================================
        // PÁGINA 5: EL ESTIRAMIENTO
        // ==========================================
        const estiramientoSet = shuffleArray(data.estiramiento).slice(0, 6);
        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>El Estiramiento</h2>
                <p class="instructions">Self-Assessment. Read the statements. If you can do it, check the box and write the Spanish phrase to prove it!</p>
        `;
        let keyEstiramiento = [];
        estiramientoSet.forEach((item, index) => {
            html += `
                <div class="checkbox-item">
                    <input type="checkbox"> <strong>I can&nbsp;</strong> ${item.cando}
                </div>
                <div class="prove-it">
                    ↳ Prove it: <span class="blank-line-med"></span>
                </div>
            `;
            keyEstiramiento.push(`${index + 1}. ${item.respuesta}`);
        });
        html += `</div>`;

        answerKey += `
            <div class="key-section">
                <h3>El Estiramiento</h3>
                ${keyEstiramiento.join(" | ")}
            </div>
        `;


        // ==========================================
        // PÁGINA 6: PROFUNDIZA
        // ==========================================
        let dialogAnswers = [];
        data.profundiza.forEach(line => { dialogAnswers = dialogAnswers.concat(line.respuestas); });
        let dialogWordBank = shuffleArray(dialogAnswers).join(" &nbsp;&nbsp;|&nbsp;&nbsp; ");

        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>Profundiza</h2>
                <p class="instructions"><strong>¡Un paso más! Lee el diálogo y completa las palabras que faltan.</strong><br>(Dig deeper! Read the dialogue and fill in the missing words.)</p>
                <div class="word-bank">${dialogWordBank}</div>
                <div style="padding: 15px; background-color: #f9f9f9; border-radius: 8px; border: 1px solid #ddd;">
        `;
        
        let keyRepeticiones = [];
        let blankCounter = 1;

        data.profundiza.forEach(line => {
            let fraseHtml = line.frase;
            line.respuestas.forEach(ans => {
                fraseHtml = fraseHtml.replace(`[target${blankCounter}]`, ` <span class="blank-line" style="width: 100px;"></span> `);
                keyRepeticiones.push(`${blankCounter}: ${ans}`);
                blankCounter++;
            });
            html += `<div class="dialogue-line"><span class="speaker">${line.speaker}:</span> ${fraseHtml}</div>`;
        });
        html += `</div></div>`;

        answerKey += `
            <div class="key-section">
                <h3>Profundiza</h3>
                ${keyRepeticiones.join(" | ")}
            </div>
        `;


        // ==========================================
        // PÁGINA 7: CLAVE DE RESPUESTAS
        // ==========================================
        html += `
            <div class="page">
                <h1>${headerTitle}</h1>
                <h2>Clave de Respuestas</h2>
                <p class="instructions">Teacher Key. Do not distribute.</p>
                ${answerKey}
            </div>
        `;

        app.innerHTML = html;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spanish Gym - Classroom Print Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">

    <style>
        /* --- DASHBOARD UI STYLES --- */
        body { font-family: 'Nunito', sans-serif; background-color: #e2e8f0; margin: 0; padding: 20px; color: #2d3748; }
        .dashboard-container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; text-align: center; font-weight: 900; }
        .section-title { border-bottom: 3px solid #ecc94b; padding-bottom: 5px; margin-top: 30px; }

        .control-panel { background: #edf2f7; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e0; margin-bottom: 20px; display: flex; gap: 20px; justify-content: center; font-size: 18px; font-weight: bold; }
        .control-panel label { cursor: pointer; display: flex; align-items: center; gap: 8px; }

        .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .topic-item { background: #f7fafc; padding: 10px 15px; border-radius: 6px; border: 1px solid #cbd5e0; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; }
        .topic-item:hover { background: #edf2f7; }

        .button-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        button { padding: 15px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 16px; font-family: 'Nunito', sans-serif; transition: 0.2s; flex-grow: 1; }
        .btn-pdf { background-color: #2b6cb0; } .btn-pdf:hover { background-color: #2c5282; }
        .btn-select { background-color: #4a5568; padding: 8px 15px; font-size: 13px; flex-grow: 0; }
        .btn-deselect { background-color: #a0aec0; color: #1a202c; padding: 8px 15px; font-size: 13px; flex-grow: 0; }

        /* --- PDF PRINT STYLES --- */
        #render-container { display: none; } 
        @page { size: 8.5in 11in; margin: 0; }
        
        .page { width: 8.5in; height: 11in; padding: 0.5in 0.6in; box-sizing: border-box; position: relative; page-break-after: always; break-after: page; overflow: hidden; background: white; }
        .page:last-child { page-break-after: auto; break-after: auto; }
        .watermark { position: absolute; top: 0.65in; left: 0.5in; width: 220px; opacity: 0.12; z-index: 1; }
        .content-layer { position: relative; z-index: 2; }
        .topic-image { float: right; width: 170px; height: auto; border-radius: 12px; border: 4px solid white; box-shadow: 3px 3px 10px rgba(0,0,0,0.2); transform: rotate(3deg); margin: 0 0 15px 25px; position: relative; z-index: 3; }
        .header-container { margin-bottom: 15px; font-size: 15px; font-weight: bold; }
        .header-row { display: flex; align-items: flex-end; margin-bottom: 12px; }
        .header-label { white-space: nowrap; margin-right: 8px; }
        .header-line { flex-grow: 1; border-bottom: 1.5px solid #333; height: 18px; }
        .topic-title-pdf { text-align: left; text-transform: uppercase; font-size: 24px; letter-spacing: 1px; margin: 0 0 10px 0; font-weight: 700; }
        .reading-text { font-size: 14px; line-height: 1.5; text-align: justify; margin-bottom: 10px; }
        .reading-text p { margin: 0 0 8px 0; }
        .instruction { font-weight: 700; font-style: italic; margin-left: 20px; margin-bottom: 6px; font-size: 14px; }
        .question-block { margin-bottom: 12px; font-size: 14px; clear: left; }
        .question-text { margin-bottom: 2px; }
        .answer-line { border-bottom: 1.5px solid #333; min-height: 22px; margin-left: 20px; padding-bottom: 2px; }

        @media print {
            body { background: white; padding: 0; margin: 0; -webkit-print-color-adjust: exact; }
            .dashboard-container { display: none !important; }
            #render-container { display: block !important; position: static !important; left: auto !important; } 
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>🏋️‍♂️ Spanish Gym - Print Center</h1>
        
        <h2 class="section-title">1. ¿Qué niveles necesitas imprimir?</h2>
        <div class="control-panel">
            <label><input type="checkbox" id="print-l1" checked> Level 1 (Beginner)</label>
            <label><input type="checkbox" id="print-l2" checked> Level 2 (Spanish II)</label>
            <label><input type="checkbox" id="print-l3" checked> Level 3 (Advanced)</label>
        </div>

        <h2 class="section-title">2. Seleccionar Temas</h2>
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <button class="btn-select" onclick="toggleAll(true)">Seleccionar Todos</button>
            <button class="btn-deselect" onclick="toggleAll(false)">Deseleccionar Todos</button>
        </div>

        <div class="topic-grid" id="topic-list"></div>

        <div class="button-group" style="margin-top: 30px;">
            <button class="btn-pdf" onclick="generateClassroomPDFs()">📄 Generar Hojas de Trabajo (Sin Respuestas)</button>
        </div>
    </div>

    <div id="render-container"></div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/lectura_cultural.json';
        const imageBaseUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/foto/';
        const watermarkUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/images/spanishgymbw.png'; 

        let globalData = [];

        async function init() {
            try {
                const response = await fetch(jsonUrl);
                globalData = await response.json();
                
                const grid = document.getElementById('topic-list');

                globalData.forEach((topic, index) => {
                    const label = document.createElement('label');
                    label.className = 'topic-item';
                    label.innerHTML = `<input type="checkbox" value="${index}"> ${topic.topicName}`;
                    grid.appendChild(label);
                });
            } catch (error) {
                document.getElementById('topic-list').innerHTML = "<p style='color:red;'>Error loading JSON from GitHub.</p>";
            }
        }

        function toggleAll(selectAll) {
            const checkboxes = document.querySelectorAll('#topic-list input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = selectAll);
        }

        function getSelectedTopics() {
            const checkboxes = document.querySelectorAll('#topic-list input:checked');
            return Array.from(checkboxes).map(cb => globalData[cb.value]);
        }

        async function waitForImages(element) {
            const images = element.querySelectorAll('img');
            const promises = Array.from(images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
            });
            await Promise.all(promises);
            await new Promise(r => setTimeout(r, 100)); 
        }

        function buildPDFPage(title, imageUrl, levelData) {
            const paragraphs = levelData.readingText.split('\n').filter(p => p.trim() !== '');
            const formattedText = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

            let html = `
                <div class="page">
                    <img src="${watermarkUrl}" class="watermark" onerror="this.style.display='none'">
                    <div class="content-layer">
                        <img src="${imageUrl}" class="topic-image">
                        <div class="header-container">
                            <div class="header-row"><span class="header-label">Nombre:</span><span class="header-line"></span></div>
                            <div class="header-row"><span class="header-label">Fecha:</span><span class="header-line" style="margin-right:20px;"></span><span class="header-label">Clase:</span><span class="header-line"></span></div>
                        </div>
                        <h1 class="topic-title-pdf">${title}</h1>
                        <div class="reading-text">${formattedText}</div>
                        <div class="instruction">${levelData.instruction}</div>
            `;
            // Render questions with an empty answer line for students to write on
            levelData.questions.forEach(q => {
                html += `<div class="question-block"><div class="question-text">${q}</div><div class="answer-line"></div></div>`;
            });
            return html + `</div></div>`;
        }

        async function generateClassroomPDFs() {
            const selected = getSelectedTopics();
            if(selected.length === 0) return alert("Selecciona al menos un tema.");
            
            const printL1 = document.getElementById('print-l1').checked;
            const printL2 = document.getElementById('print-l2').checked;
            const printL3 = document.getElementById('print-l3').checked;

            if(!printL1 && !printL2 && !printL3) return alert("Selecciona al menos un nivel para imprimir.");

            const container = document.getElementById('render-container');
            container.innerHTML = ''; 
            
            selected.forEach(topic => {
                const imageUrl = imageBaseUrl + topic.imageFileName;
                
                if (printL1 && topic.levels.level_1) {
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels.level_1);
                }
                if (printL2 && topic.levels.level_2) {
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels.level_2);
                }
                if (printL3 && topic.levels.level_3) {
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels.level_3);
                }
            });

            await waitForImages(container);
            await autoFitPages();
            window.print();
        }

        async function autoFitPages() {
            const container = document.getElementById('render-container');
            
            container.style.display = 'block';
            container.style.position = 'absolute';
            container.style.left = '-9999px'; 
            
            const pages = document.querySelectorAll('.page');
            
            pages.forEach(page => {
                const contentLayer = page.querySelector('.content-layer');
                if (!contentLayer) return;

                const maxAllowedHeight = 960; 

                let readingText = page.querySelector('.reading-text');
                let questions = page.querySelectorAll('.question-block');
                let instruction = page.querySelector('.instruction');
                
                let textSize = 14; 
                let qSize = 14;
                let spacing = 10; 

                while (contentLayer.scrollHeight > maxAllowedHeight && textSize > 10.5) {
                    textSize -= 0.2; 
                    qSize -= 0.2;
                    spacing -= 0.2;

                    if (readingText) {
                        readingText.style.fontSize = textSize + 'px';
                        readingText.style.marginBottom = spacing + 'px';
                        readingText.style.lineHeight = '1.35';
                    }
                    if (instruction) {
                        instruction.style.fontSize = qSize + 'px';
                        instruction.style.marginBottom = (spacing / 2) + 'px';
                    }
                    questions.forEach(q => {
                        q.style.fontSize = qSize + 'px';
                        q.style.marginBottom = (spacing - 2) + 'px';
                    });
                }
            });

            container.style.display = '';
            container.style.position = '';
            container.style.left = '';
        }
        
        init();
    </script>
</body>
</html>

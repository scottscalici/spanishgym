<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Lecturas Culturales</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* The Page Canvas - Expanded margins for more text */
        .page {
            background-color: white;
            width: 8.5in;
            height: 11in;
            padding: 0.5in 0.6in; /* Reduced from 0.8in to give more room */
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Print Rules */
        @media print {
            body { background-color: white; padding: 0; margin: 0; }
            .page { box-shadow: none; margin: 0; break-after: page; }
            .no-print { display: none; }
        }

        /* Official Watermark */
        .watermark {
            position: absolute;
            top: 1in;
            left: 0.5in;
            width: 250px;
            opacity: 0.12; /* Slightly softer so text remains readable over it */
            z-index: 1;
        }

        /* Content Layer */
        .content-layer {
            position: relative;
            z-index: 2;
        }

        /* HEADER LAYOUT - Tightened vertical spacing */
        .header-container {
            width: 68%; /* Leaves room for image */
            margin-bottom: 15px; /* Reduced space */
            font-size: 15px;
            font-weight: bold;
        }
        .header-row {
            display: flex;
            align-items: flex-end;
            margin-bottom: 12px;
        }
        .header-label {
            white-space: nowrap;
            margin-right: 8px;
        }
        .header-line {
            flex-grow: 1;
            border-bottom: 1.5px solid #333;
            height: 18px;
        }

        /* Topic Title */
        .topic-title {
            text-align: center;
            text-transform: uppercase;
            font-size: 24px; /* Slightly smaller to save space */
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 0;
            width: 68%;
            font-weight: 700;
        }

        /* Right-Side Image - Adjusted to match new margins */
        .topic-image {
            position: absolute;
            top: 0.5in;
            right: 0.6in;
            width: 170px; /* Slightly smaller */
            height: auto;
            border-radius: 12px;
            border: 4px solid white;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
            transform: rotate(3deg); 
            z-index: 3;
        }

        /* Reading Text - Optimized for 230 words and paragraphs */
        .reading-text {
            font-size: 14px;
            line-height: 1.5;
            text-align: justify;
            margin-bottom: 10px;
        }
        .reading-text p {
            margin-top: 0;
            margin-bottom: 8px; /* Tightened space between paragraphs */
        }

        /* Instruction Line */
        .instruction {
            font-weight: 700;
            font-style: italic;
            margin-left: 20px;
            margin-bottom: 6px; 
            font-size: 14px;
        }

        /* Questions & Lines - Tightened vertical space */
        .question-block {
            margin-bottom: 12px; /* Reduced from 16px */
            font-size: 14px;
        }
        .question-text {
            margin-bottom: 2px;
        }
        .answer-line {
            border-bottom: 1.5px solid #333;
            height: 20px; /* Reduced from 22px */
            position: relative;
            margin-left: 20px;
        }

        /* Answer Key Text */
        .answer-text {
            position: absolute;
            bottom: 2px;
            left: 10px;
            color: #1a365d; /* Dark Blue */
            font-weight: 700;
            font-style: italic;
            font-size: 14px;
        }
        
        /* UI Controls */
        .controls {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 15px;
            background-color: #1a365d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
        }
        button:hover { background-color: #2c5282; }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button onclick="window.print()">Guardar como PDF (Print)</button>
        <p style="font-size: 12px; color: gray;">Generando con marca de agua y formato ajustado...</p>
    </div>

    <div id="document-container"></div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/lectura_cultural.json';
        const imageBaseUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/foto/';
        
        // Official Grayscale Watermark
        const watermarkUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/images/spanishgymbw.png'; 

        async function init() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                generateWorksheetPack(data[0]); 
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('document-container').innerHTML = "<p>Error loading JSON. Did you push your updates to GitHub?</p>";
            }
        }

        function generateWorksheetPack(topic) {
            const container = document.getElementById('document-container');
            container.innerHTML = ''; 
            
            const imageUrl = imageBaseUrl + topic.imageFileName;
            const levels = ['level_1', 'level_2', 'level_3'];

            levels.forEach(levelKey => {
                const levelData = topic.levels[levelKey];
                container.appendChild(createPage(topic.topicName, imageUrl, levelData, false));
                container.appendChild(createPage(topic.topicName, imageUrl, levelData, true));
            });
        }

        function createPage(title, imageUrl, levelData, isAnswerKey) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';

            // Split text by newlines and wrap in <p> tags
            const paragraphs = levelData.readingText.split('\n').filter(p => p.trim() !== '');
            const formattedText = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

            let html = `
                <img src="${watermarkUrl}" class="watermark" alt="The Spanish Gym" onerror="this.style.display='none'">
                <img src="${imageUrl}" class="topic-image" alt="${title}">
                
                <div class="content-layer">
                    
                    <div class="header-container">
                        <div class="header-row">
                            <span class="header-label">Nombre:</span>
                            <span class="header-line"></span>
                        </div>
                        <div class="header-row">
                            <span class="header-label">Fecha:</span>
                            <span class="header-line" style="margin-right: 20px;"></span>
                            <span class="header-label">Clase:</span>
                            <span class="header-line"></span>
                        </div>
                    </div>
                    
                    <h1 class="topic-title">${title}</h1>
                    
                    <div class="reading-text">${formattedText}</div>
                    
                    <div class="instruction">${levelData.instruction}</div>
            `;

            levelData.questions.forEach((question, index) => {
                let answerHtml = '';
                if (isAnswerKey) {
                    answerHtml = `<div class="answer-text">${levelData.answerKey[index]}</div>`;
                }

                html += `
                    <div class="question-block">
                        <div class="question-text">${question}</div>
                        <div class="answer-line">
                            ${answerHtml}
                        </div>
                    </div>
                `;
            });

            html += `</div>`; 
            pageDiv.innerHTML = html;
            return pageDiv;
        }

        init();
    </script>
</body>
</html>

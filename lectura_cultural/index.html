<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Lecturas Culturales</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Page Canvas */
        .page {
            background-color: white;
            width: 8.5in;
            height: 11in;
            padding: 0.8in;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Print Rules - This slices the document into 6 pages */
        @media print {
            body {
                background-color: white;
                padding: 0;
                margin: 0;
            }
            .page {
                box-shadow: none;
                margin: 0;
                break-after: page;
            }
            .no-print {
                display: none;
            }
        }

        /* Watermark */
        .watermark {
            position: absolute;
            top: 1in;
            left: 0.5in;
            width: 250px;
            opacity: 0.15; /* Subtle branding */
            z-index: 1;
        }

        /* Content Z-Index so it sits above watermark */
        .content-layer {
            position: relative;
            z-index: 2;
        }

        /* Header Layout */
        .header-lines {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin-bottom: 30px;
            width: 70%; /* Leaves room for the image on the right */
        }
        .header-lines span {
            border-bottom: 1px solid black;
            display: inline-block;
            flex-grow: 1;
            margin-left: 10px;
        }
        .header-item {
            display: flex;
            width: 48%;
        }

        /* Topic Title */
        .topic-title {
            text-align: center;
            text-transform: uppercase;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            width: 70%;
        }

        /* Right-Side Image with Rotation */
        .topic-image {
            position: absolute;
            top: 0.8in;
            right: 0.8in;
            width: 180px;
            height: auto;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            transform: rotate(3deg); /* Slight tilt */
            z-index: 3;
        }

        /* Reading Text */
        .reading-text {
            font-size: 14px;
            line-height: 1.5;
            text-align: justify;
            margin-bottom: 15px;
        }

        /* Instruction Line */
        .instruction {
            font-weight: bold;
            font-style: italic;
            margin-left: 20px;
            margin-bottom: 5px; /* Tight to the first question */
            font-size: 14px;
        }

        /* Questions & Lines */
        .question-block {
            margin-bottom: 15px;
            font-size: 14px;
        }
        .question-text {
            margin-bottom: 5px;
        }
        .answer-line {
            border-bottom: 1px solid black;
            height: 22px;
            position: relative;
            margin-left: 20px;
        }

        /* The Answer Key Text */
        .answer-text {
            position: absolute;
            bottom: 2px;
            left: 5px;
            color: #1a365d; /* Dark Blue */
            font-weight: bold;
            font-style: italic;
            font-size: 14px;
        }
        
        /* UI Controls */
        .controls {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 15px;
            background-color: #1a365d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2c5282; }
    </style>
</head>
<body>

    <div class="controls no-print">
        <button onclick="window.print()">Guardar como PDF (Print)</button>
        <p style="font-size: 12px; color: gray;">Currently fetching the first topic from GitHub for testing...</p>
    </div>

    <div id="document-container"></div>

    <script>
        // Your live GitHub Data Sources
        const jsonUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/lectura_cultural.json';
        const imageBaseUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/foto/';
        
        // Ensure you have a watermark.png in your /foto/ folder, or update this filename!
        const watermarkUrl = imageBaseUrl + 'watermark.png'; 

        async function init() {
            try {
                const response = await fetch(jsonUrl);
                const data = await response.json();
                
                // For the initial test, we will just render the first topic in the array (Los Moáis)
                // Later, we will wrap this in a loop to generate bundles based on checkboxes
                generateWorksheetPack(data[0]); 
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('document-container').innerHTML = "<p>Error loading JSON. Check console.</p>";
            }
        }

        function generateWorksheetPack(topic) {
            const container = document.getElementById('document-container');
            container.innerHTML = ''; // Clear container
            
            const imageUrl = imageBaseUrl + topic.imageFileName;
            const levels = ['level_1', 'level_2', 'level_3'];

            levels.forEach(levelKey => {
                const levelData = topic.levels[levelKey];
                
                // 1. Generate Student Page (No Answers)
                container.appendChild(createPage(topic.topicName, imageUrl, levelData, false));
                
                // 2. Generate Teacher Page (With Answers)
                container.appendChild(createPage(topic.topicName, imageUrl, levelData, true));
            });
        }

        function createPage(title, imageUrl, levelData, isAnswerKey) {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';

            // HTML Skeleton
            let html = `
                <img src="${watermarkUrl}" class="watermark" alt="The Spanish Gym Watermark" onerror="this.style.display='none'">
                <img src="${imageUrl}" class="topic-image" alt="${title}">
                
                <div class="content-layer">
                    <div class="header-lines">
                        <div class="header-item">Nombre: <span></span></div>
                        <div class="header-item">Clase: <span></span></div>
                    </div>
                    <div class="header-lines" style="width: 40%;">
                        <div class="header-item">Fecha: <span></span></div>
                    </div>
                    
                    <h1 class="topic-title">${title}</h1>
                    
                    <div class="reading-text">${levelData.readingText}</div>
                    
                    <div class="instruction">${levelData.instruction}</div>
            `;

            // Loop through the 7 questions
            levelData.questions.forEach((question, index) => {
                let answerHtml = '';
                if (isAnswerKey) {
                    answerHtml = `<div class="answer-text">${levelData.answerKey[index]}</div>`;
                }

                html += `
                    <div class="question-block">
                        <div class="question-text">${question}</div>
                        <div class="answer-line">
                            ${answerHtml}
                        </div>
                    </div>
                `;
            });

            html += `</div>`; // Close content-layer
            pageDiv.innerHTML = html;
            return pageDiv;
        }

        // Boot up the engine
        init();
    </script>
</body>
</html>

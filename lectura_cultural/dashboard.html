<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spanish Gym - TPT Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- DASHBOARD UI STYLES --- */
        body { font-family: 'Nunito', sans-serif; background-color: #e2e8f0; margin: 0; padding: 20px; color: #2d3748; }
        .dashboard-container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a365d; text-align: center; font-weight: 900; }
        .section-title { border-bottom: 3px solid #ecc94b; padding-bottom: 5px; margin-top: 30px; }

        .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .topic-item { background: #f7fafc; padding: 10px 15px; border-radius: 6px; border: 1px solid #cbd5e0; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; }
        .topic-item:hover { background: #edf2f7; }

        .input-group { margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        
        .button-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        button { padding: 12px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 14px; font-family: 'Nunito', sans-serif; transition: 0.2s; flex-grow: 1; }
        .btn-pdf { background-color: #2b6cb0; } .btn-pdf:hover { background-color: #2c5282; }
        .btn-png { background-color: #c53030; } .btn-png:hover { background-color: #9b2c2c; }
        .btn-bundle { background-color: #276749; } .btn-bundle:hover { background-color: #22543d; }

        /* --- PDF PRINT STYLES --- */
        #render-container { display: none; } 
        @page { size: 8.5in 11in; margin: 0; }
        @media print {
            body { background: white; padding: 0; margin: 0; -webkit-print-color-adjust: exact; }
            .dashboard-container { display: none !important; }
            #render-container { display: block; }
            .page { width: 8.5in; height: 11in; padding: 0.5in 0.6in; box-sizing: border-box; position: relative; page-break-after: always; break-after: page; overflow: hidden; }
            .page:last-child { page-break-after: auto; break-after: auto; }
            
            .watermark { position: absolute; top: 0.65in; left: 0.5in; width: 220px; opacity: 0.12; z-index: 1; }
            .content-layer { position: relative; z-index: 2; }
            .topic-image { float: right; width: 170px; height: auto; border-radius: 12px; border: 4px solid white; box-shadow: 3px 3px 10px rgba(0,0,0,0.2); transform: rotate(3deg); margin: 0 0 15px 25px; position: relative; z-index: 3; }
            .header-container { margin-bottom: 15px; font-size: 15px; font-weight: bold; }
            .header-row { display: flex; align-items: flex-end; margin-bottom: 12px; }
            .header-label { white-space: nowrap; margin-right: 8px; }
            .header-line { flex-grow: 1; border-bottom: 1.5px solid #333; height: 18px; }
            .topic-title-pdf { text-align: left; text-transform: uppercase; font-size: 24px; letter-spacing: 1px; margin: 0 0 10px 0; font-weight: 700; }
            .reading-text { font-size: 14px; line-height: 1.5; text-align: justify; margin-bottom: 10px; }
            .reading-text p { margin: 0 0 8px 0; }
            .instruction { font-weight: 700; font-style: italic; margin-left: 20px; margin-bottom: 6px; font-size: 14px; }
            .question-block { margin-bottom: 12px; font-size: 14px; clear: left; }
            .question-text { margin-bottom: 2px; }
            .answer-line { border-bottom: 1.5px solid #333; height: 20px; position: relative; margin-left: 20px; }
            .answer-text { position: absolute; bottom: 2px; left: 10px; color: #1a365d; font-weight: 700; font-style: italic; font-size: 14px; }

            .index-title { text-align: center; font-size: 40px; color: #1a365d; text-transform: uppercase; margin-top: 1in; font-weight: 900;}
            .index-subtitle { text-align: center; font-size: 20px; margin-bottom: 40px; font-style: italic; color: #4a5568;}
            .index-list { list-style-type: none; padding: 0 1in; font-size: 20px; line-height: 2; font-weight: bold; }
            .index-list li { border-bottom: 1px dashed #cbd5e0; margin-bottom: 10px; }
        }

        /* --- PNG PREVIEW GENERATOR STYLES --- */
        #png-staging { position: absolute; left: -9999px; top: 0; }
        
        .tpt-preview { width: 800px; height: 800px; background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%); position: relative; box-sizing: border-box; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bundle-preview { background: linear-gradient(135deg, #276749 0%, #38a169 100%); }

        .category-tag { background-color: #ecc94b; color: #1a365d; font-size: 20px; font-weight: 900; text-transform: uppercase; padding: 8px 20px; border-radius: 30px; display: inline-block; margin-bottom: 15px; }
        .preview-title { color: white; font-size: 50px; font-weight: 900; text-transform: uppercase; margin: 0 0 30px 0; line-height: 1.1; text-shadow: 2px 4px 8px rgba(0,0,0,0.3); width: 90%; }
        
        .badge-container { position: absolute; top: 250px; left: 40px; display: flex; flex-direction: column; gap: 20px; z-index: 3; }
        .badge { background: white; color: #1a365d; padding: 15px 25px; border-radius: 12px; font-size: 22px; font-weight: 900; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border-left: 8px solid #ecc94b; }
        
        .logo { position: absolute; bottom: 30px; left: 40px; width: 250px; background: rgba(255, 255, 255, 0.9); padding: 10px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Single Image Style */
        .main-image { width: 380px; height: 380px; object-fit: cover; border: 8px solid white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); transform: rotate(-3deg); position: absolute; right: 50px; top: 220px; z-index: 2; }
        
        /* NEW: Bundle Scattered Stack Style */
        .bundle-stack { position: absolute; top: 200px; right: 70px; width: 350px; height: 350px; z-index: 2; }
        .bundle-stack img { position: absolute; width: 240px; height: 240px; object-fit: cover; border: 6px solid white; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .bundle-stack img:nth-child(1) { top: 0; right: 0; transform: rotate(6deg); z-index: 1; }
        .bundle-stack img:nth-child(2) { top: 30px; right: 90px; transform: rotate(-8deg); z-index: 2; }
        .bundle-stack img:nth-child(3) { top: 110px; right: 10px; transform: rotate(12deg); z-index: 3; }
        .bundle-stack img:nth-child(4) { top: 140px; right: 110px; transform: rotate(-4deg); z-index: 4; }

        /* NEW: Bundle Index Box */
        .bundle-index { position: absolute; bottom: 30px; right: 40px; background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 280px; z-index: 4; border-left: 8px solid #ecc94b; }
        .bundle-index h3 { margin: 0 0 10px 0; color: #1a365d; font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .bundle-index ul { margin: 0; padding-left: 20px; color: #333; font-weight: bold; font-size: 16px; line-height: 1.4; }
        .bundle-index li { margin-bottom: 5px; }
        .bundle-more { margin-top: 10px; font-style: italic; color: #c53030; font-weight: 900; font-size: 16px;}

    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>🏋️‍♂️ The Spanish Gym Dashboard</h1>
        
        <div class="input-group">
            <label class="section-title" style="display:block; margin-bottom:10px;">Título del Bundle (Opcional)</label>
            <input type="text" id="bundle-title" placeholder="Ej. Culturas de Latinoamérica Bundle">
        </div>

<h2 class="section-title">Seleccionar Temas</h2>
        
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <button onclick="toggleAll(true)" style="background-color: #4a5568; padding: 6px 12px; font-size: 12px; flex-grow: 0;">Seleccionar Todos</button>
            <button onclick="toggleAll(false)" style="background-color: #a0aec0; padding: 6px 12px; font-size: 12px; flex-grow: 0; color: #1a202c;">Deseleccionar Todos</button>
        </div>

        <div class="topic-grid" id="topic-list"></div>

        <h2 class="section-title">Generar Recursos Individuales</h2>
        <div class="button-group">
            <button class="btn-pdf" onclick="generateSelectedPDFs()">📄 Imprimir PDFs Seleccionados</button>
            <button class="btn-png" onclick="generateSelectedPNGs()">🖼️ Descargar Portadas (PNG)</button>
        </div>

        <h2 class="section-title">Generar Bundles (Requiere Título)</h2>
        <div class="button-group">
            <button class="btn-bundle" onclick="generateBundlePDF()">📚 Imprimir Bundle (PDF con Índice)</button>
            <button class="btn-bundle" onclick="generateBundlePNG()">🎨 Descargar Portada de Bundle (PNG)</button>
        </div>
    </div>

    <div id="render-container"></div>
    <div id="png-staging"></div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/lectura_cultural.json';
        const imageBaseUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/lectura_cultural/foto/';
        const watermarkUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/images/spanishgymbw.png'; 
        const colorLogoUrl = 'https://raw.githubusercontent.com/scottscalici/spanishgym/main/images/spanishgym.png';

        let globalData = [];

async function init() {
            try {
                const response = await fetch(jsonUrl);
                globalData = await response.json();
                
                const grid = document.getElementById('topic-list');
                globalData.forEach((topic, index) => {
                    const label = document.createElement('label');
                    label.className = 'topic-item';
                    
                    // FIXED: Removed the "checked" attribute from the input tag below
                    label.innerHTML = `<input type="checkbox" value="${index}"> ${topic.topicName}`;
                    
                    grid.appendChild(label);
                });
            } catch (error) {
                document.getElementById('topic-list').innerHTML = "<p style='color:red;'>Error loading JSON from GitHub.</p>";
            }
        }

        // NEW HELPER: Select or deselect all checkboxes at once
        function toggleAll(selectAll) {
            const checkboxes = document.querySelectorAll('#topic-list input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = selectAll);
        }

        function getSelectedTopics() {
            const checkboxes = document.querySelectorAll('#topic-list input:checked');
            return Array.from(checkboxes).map(cb => globalData[cb.value]);
        }

        async function waitForImages(element) {
            const images = element.querySelectorAll('img');
            const promises = Array.from(images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
            });
            await Promise.all(promises);
            await new Promise(r => setTimeout(r, 100)); 
        }

        async function generateSelectedPDFs() {
            const selected = getSelectedTopics();
            if(selected.length === 0) return alert("Selecciona al menos un tema.");
            
            const container = document.getElementById('render-container');
            container.innerHTML = ''; 
            
            selected.forEach(topic => {
                const imageUrl = imageBaseUrl + topic.imageFileName;
                ['level_1', 'level_2', 'level_3'].forEach(level => {
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels[level], false);
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels[level], true);
                });
            });
            await waitForImages(container);
            window.print();
        }

        async function generateBundlePDF() {
            const selected = getSelectedTopics();
            const bundleTitle = document.getElementById('bundle-title').value || "Spanish Cultural Readings Bundle";
            if(selected.length === 0) return alert("Selecciona temas para el bundle.");

            const container = document.getElementById('render-container');
            container.innerHTML = ''; 

            let indexHtml = `<div class="page"><img src="${watermarkUrl}" class="watermark" style="top:40%; width:400px; left:2.5in; opacity:0.05;"><h1 class="index-title">${bundleTitle}</h1><p class="index-subtitle">Índice de Temas Incluidos</p><ul class="index-list">`;
            selected.forEach(topic => { indexHtml += `<li>✔ ${topic.topicName}</li>`; });
            indexHtml += `</ul></div>`;
            container.innerHTML += indexHtml;

            selected.forEach(topic => {
                const imageUrl = imageBaseUrl + topic.imageFileName;
                ['level_1', 'level_2', 'level_3'].forEach(level => {
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels[level], false);
                    container.innerHTML += buildPDFPage(topic.topicName, imageUrl, topic.levels[level], true);
                });
            });
            await waitForImages(container);
            window.print();
        }

        function buildPDFPage(title, imageUrl, levelData, isAnswerKey) {
            const paragraphs = levelData.readingText.split('\n').filter(p => p.trim() !== '');
            const formattedText = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

            let html = `
                <div class="page">
                    <img src="${watermarkUrl}" class="watermark" onerror="this.style.display='none'">
                    <div class="content-layer">
                        <img src="${imageUrl}" class="topic-image">
                        <div class="header-container">
                            <div class="header-row"><span class="header-label">Nombre:</span><span class="header-line"></span></div>
                            <div class="header-row"><span class="header-label">Fecha:</span><span class="header-line" style="margin-right:20px;"></span><span class="header-label">Clase:</span><span class="header-line"></span></div>
                        </div>
                        <h1 class="topic-title-pdf">${title}</h1>
                        <div class="reading-text">${formattedText}</div>
                        <div class="instruction">${levelData.instruction}</div>
            `;
            levelData.questions.forEach((q, i) => {
                let ans = isAnswerKey ? `<div class="answer-text">${levelData.answerKey[i]}</div>` : '';
                html += `<div class="question-block"><div class="question-text">${q}</div><div class="answer-line">${ans}</div></div>`;
            });
            return html + `</div></div>`;
        }

        async function generateSelectedPNGs() {
            const selected = getSelectedTopics();
            if(selected.length === 0) return alert("Selecciona al menos un tema.");
            const staging = document.getElementById('png-staging');
            for (let topic of selected) {
                staging.innerHTML = buildPreviewHTML(topic.topicName, [imageBaseUrl + topic.imageFileName], false, [topic]);
                await waitForImages(staging);
                await triggerDownload(document.querySelector('.tpt-preview'), `${topic.topicName}_Cover.png`);
            }
            staging.innerHTML = ''; 
        }

        async function generateBundlePNG() {
            const selected = getSelectedTopics();
            const bundleTitle = document.getElementById('bundle-title').value;
            if(selected.length < 2) return alert("Un bundle necesita al menos 2 temas.");
            if(!bundleTitle) return alert("Por favor, escribe un Título para el Bundle arriba.");

            const staging = document.getElementById('png-staging');
            const images = selected.map(t => imageBaseUrl + t.imageFileName);
            
            // Pass the entire selected array to build the index
            staging.innerHTML = buildPreviewHTML(bundleTitle, images, true, selected);
            await waitForImages(staging);
            await triggerDownload(document.querySelector('.tpt-preview'), `${bundleTitle}_Bundle_Cover.png`);
            staging.innerHTML = ''; 
        }

        // --- UPDATED PREVIEW BUILDER WITH INDEX LOGIC ---
        function buildPreviewHTML(title, images, isBundle, selectedTopics) {
            const extraClass = isBundle ? "bundle-preview" : "";
            const tagText = isBundle ? "Gran Bundle Cultural" : "Lectura Cultural Diferenciada";
            
            let visualContent = '';
            
            if(isBundle) {
                // 1. Scattered Image Stack
                visualContent += `<div class="bundle-stack">`;
                images.slice(0, 4).forEach(img => visualContent += `<img src="${img}" crossorigin="anonymous">`);
                visualContent += `</div>`;

                // 2. Dynamic Topic Index
                visualContent += `<div class="bundle-index"><h3>Temas Incluidos:</h3><ul>`;
                const topicsToShow = selectedTopics.slice(0, 5); // Show up to 5
                topicsToShow.forEach(t => visualContent += `<li>• ${t.topicName}</li>`);
                visualContent += `</ul>`;
                
                // 3. "Y Unos Más" Logic
                if(selectedTopics.length > 5) {
                    const leftover = selectedTopics.length - 5;
                    visualContent += `<div class="bundle-more">+ ¡${leftover} temas más!</div>`;
                }
                visualContent += `</div>`;

            } else {
                // Single Image
                visualContent = `<img src="${images[0]}" class="main-image" crossorigin="anonymous">`;
            }

            return `
                <div class="tpt-preview ${extraClass}">
                    <div class="category-tag">${tagText}</div>
                    <h1 class="preview-title">${title}</h1>
                    <div class="badge-container">
                        <div class="badge">📚 3 Niveles de Lectura</div>
                        <div class="badge">✅ Claves de Respuestas</div>
                        <div class="badge">🧠 Comprensión Crítica</div>
                        <div class="badge">🌎 Cultura Auténtica</div>
                    </div>
                    ${visualContent}
                    <img src="${colorLogoUrl}" class="logo" crossorigin="anonymous">
                </div>
            `;
        }

        async function triggerDownload(element, filename) {
            const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: null });
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
            await new Promise(r => setTimeout(r, 500)); 
        }

        init();
    </script>
</body>
</html>

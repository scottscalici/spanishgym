<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Spanish Gym: Creador de Unidades</title>
    <style>
        /* Base Screen Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; color: #222; background-color: #525659; margin: 0; padding: 20px; }
        
        #control-panel { background-color: #2c3e50; color: white; padding: 25px; border-radius: 8px; max-width: 8.5in; margin: 0 auto 20px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px;}
        select { padding: 10px; font-size: 15px; border-radius: 5px; flex-grow: 1; }
        button { padding: 12px 25px; font-size: 16px; background-color: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #d35400; }

        .dashboard-section { background: #34495e; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .dashboard-section h3 { color: #ecc94b; margin-top: 0; margin-bottom: 10px; font-size: 15px; }
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .checkbox-grid label { font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* Continuous Flow Pages */
        .page-continuous { background: white; max-width: 8.5in; margin: 0 auto 20px auto; padding: 0.5in; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .content-layer { position: relative; z-index: 2; height: 100%; }

        /* Typography */
        .level-main-title { text-align: center; font-size: 24px; color: #2c3e50; border-bottom: 3px solid #e67e22; padding-bottom: 10px; margin-top: 0; margin-bottom: 30px; text-transform: uppercase; font-weight: 900;}
        .stage-title { font-size: 16px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-top: 30px;}
        
        .exercise-block { break-inside: avoid; page-break-inside: avoid; margin-bottom: 35px; }
        .exercise-block h2 { color: #e67e22; margin-top: 0px; margin-bottom: 5px; font-size: 18px; text-transform: uppercase; }
        .instructions { font-style: italic; color: #555; margin-bottom: 15px; font-size: 13px; margin-top: 0; }
        
        .grammar-notes { background-color: #f7fafc; border-left: 4px solid #2c3e50; padding: 12px; margin-bottom: 20px; font-size: 13px;}
        .grammar-notes ul { margin: 0; padding-left: 20px; }
        
        .two-col { display: flex; justify-content: space-between; font-size: 13.5px; }
        .col { width: 48%; list-style-type: none; padding: 0; margin-top: 0;}
        .match-col li { margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 4px; }
        
        .blank-line { display: inline-block; width: 120px; border-bottom: 1px solid #222; margin: 0 5px; }
        .blank-line-med { display: inline-block; width: 200px; border-bottom: 1px solid #222; margin: 0 5px; }
        .blank-line-long { display: block; width: 100%; border-bottom: 1px solid #222; margin-top: 20px; margin-bottom: 10px;}
        
        .question-item { margin-bottom: 16px; font-size: 14px; line-height: 1.5;}
        .mcq-options { margin-left: 25px; margin-top: 5px;}
        .mcq-options span { margin-right: 20px; }
        .word-bank { background: #ecf0f1; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 15px; border-radius: 5px;}
        .clue-bold { font-weight: bold; color: #c0392b; }
        .paragraph-text { font-size: 14.5px; line-height: 1.8; text-indent: 30px; text-align: justify;}

        .key-section { margin-bottom: 15px; font-size: 12px; line-height: 1.4; break-inside: avoid;}
        .key-section h3 { margin: 5px 0; color: #c0392b; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 2px;}

        #loading-indicator { color: #ecc94b; margin-top: 15px; font-weight: bold; text-align: center; display: none; }

        @media print {
            body { background-color: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
            @page { size: letter portrait; margin: 0.5in; }
            .page-continuous { box-shadow: none; margin: 0; padding: 0; max-width: 100%; width: 100%; break-after: page; page-break-after: always;}
        }
    </style>
</head>
<body>

    <div id="control-panel" class="no-print">
        <h2 style="margin-top:0; text-align:center; margin-bottom: 20px;">The Spanish Gym: Constructor de Unidades</h2>
        
        <div class="control-row">
            <select id="topic-selector" onchange="fetchAndLoadTopic()">
                <option value="" disabled selected>Cargando temas desde GitHub...</option>
            </select>
            
            <select id="level-selector" onchange="buildStageCheckboxes()">
                <option value="level_1">Nivel 1 (Beginner)</option>
                <option value="level_2">Nivel 2 (Structured)</option>
                <option value="level_3">Nivel 3 (Advanced)</option>
                <option value="all">⭐ Todos los Niveles (Master PDF)</option>
            </select>
            <button onclick="generateWorkbook()">Generar PDF</button>
        </div>

        <div class="dashboard-section">
            <h3>1. Selecciona las Etapas Gramaticales (Temas)</h3>
            <div id="dynamic-stages" class="checkbox-grid">
                <span style="color: #95a5a6; font-size: 14px;">Selecciona un tema arriba para cargar las etapas...</span>
            </div>
        </div>

        <div class="dashboard-section">
            <h3>2. Selecciona las Actividades de Entrenamiento</h3>
            <div class="checkbox-grid">
                <label><input type="checkbox" class="activity-cb" value="preparate" checked> 📋 Prepárate</label>
                <label><input type="checkbox" class="activity-cb" value="calentamiento" checked> 🏃 Calentamiento</label>
                <label><input type="checkbox" class="activity-cb" value="cardio_ligero" checked> 🚶 Cardio Ligero</label>
                <label><input type="checkbox" class="activity-cb" value="cardio_fuerte" checked> 🚴 Cardio Fuerte</label>
                <label><input type="checkbox" class="activity-cb" value="levantar_pesas" checked> 🏋️ Levantar Pesas</label>
                <label><input type="checkbox" class="activity-cb" value="reto_final" checked> 🔥 Reto Final</label>
            </div>
        </div>
        
        <div id="loading-indicator">Descargando datos y ensamblando libro...</div>
    </div>
    
    <div id="app"></div>

    <script>
        const repoApiUrl = 'https://api.github.com/repos/scottscalici/spanishgym/contents/grammar';
        let currentGrammarData = null;

        async function initFolder() {
            try {
                const response = await fetch(repoApiUrl);
                if (!response.ok) throw new Error('Could not read GitHub folder');
                const files = await response.json();

                const availableTopics = files
                    .filter(file => file.name.endsWith('.json'))
                    .map((file) => {
                        let cleanName = file.name.replace('.json', '').replace(/_/g, ' '); 
                        cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);
                        return { name: cleanName, url: file.download_url };
                    });

                const selector = document.getElementById('topic-selector');
                selector.innerHTML = '<option value="" disabled selected>Selecciona un tema...</option>'; 
                
                if (availableTopics.length === 0) {
                    selector.innerHTML = '<option disabled>No se encontraron archivos JSON</option>';
                    return;
                }

                availableTopics.forEach(topic => {
                    const option = document.createElement('option');
                    option.value = topic.url;
                    option.text = topic.name;
                    selector.appendChild(option);
                });

            } catch (error) {
                console.error("Error reading GitHub folder:", error);
                document.getElementById('topic-selector').innerHTML = '<option disabled>Error cargando temas desde GitHub</option>';
            }
        }

        initFolder();

        async function fetchAndLoadTopic() {
            const topicUrl = document.getElementById('topic-selector').value;
            if (!topicUrl) return;

            const loadingText = document.getElementById('loading-indicator');
            loadingText.style.display = 'block';
            loadingText.innerText = "Cargando datos del tema...";

            try {
                const response = await fetch(topicUrl);
                if (!response.ok) throw new Error('Network error');
                currentGrammarData = await response.json();
                
                loadingText.style.display = 'none';
                buildStageCheckboxes(); 
                
            } catch (error) {
                loadingText.innerText = "Error: No se pudo cargar el archivo.";
                console.error('Fetch error:', error);
            }
        }

        function buildStageCheckboxes() {
            if (!currentGrammarData) return;
            let levelKey = document.getElementById('level-selector').value;
            const stagesContainer = document.getElementById('dynamic-stages');
            stagesContainer.innerHTML = ''; 

            if (levelKey === 'all') {
                levelKey = 'level_1'; 
            }

            if (!currentGrammarData.levels[levelKey]) {
                stagesContainer.innerHTML = '<span style="color:#e74c3c;">Datos no disponibles para este nivel aún.</span>';
                return;
            }

            const stages = currentGrammarData.levels[levelKey].stages;
            stages.forEach(stage => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" class="stage-cb" value="${stage.stage_id}" checked> ${stage.stage_title}`;
                stagesContainer.appendChild(label);
            });
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function generateWorkbook() {
            if (!currentGrammarData) {
                alert("Por favor, selecciona un tema de la lista primero.");
                return;
            }

            const levelKey = document.getElementById('level-selector').value;
            const selectedStageIds = Array.from(document.querySelectorAll('.stage-cb:checked')).map(cb => cb.value);
            const selectedActivities = Array.from(document.querySelectorAll('.activity-cb:checked')).map(cb => cb.value);

            if (selectedStageIds.length === 0 || selectedActivities.length === 0) {
                alert("Debes seleccionar al menos una etapa y una actividad.");
                return;
            }

            const app = document.getElementById('app');
            let html = '';
            let masterKeyHTML = ''; 
            const topicName = currentGrammarData.grammar_topic;

            let levelsToProcess = [];
            if (levelKey === 'all') {
                levelsToProcess = ['level_1', 'level_2', 'level_3'];
            } else {
                levelsToProcess = [levelKey];
            }

            levelsToProcess.forEach(currentLevelKey => {
                const levelData = currentGrammarData.levels[currentLevelKey];
                if (!levelData) return; 

                // Start a Continuous Page for the specific Level
                html += `<div class="page-continuous"><div class="content-layer">`;
                
                let readableLevel = currentLevelKey.replace('_', ' ').toUpperCase();
                html += `<h1 class="level-main-title">${topicName} - ${readableLevel}</h1>`;

                masterKeyHTML += `<h2 style="margin-top: 30px; border-bottom: 2px solid #2c3e50; color: #2c3e50;">Clave: ${readableLevel}</h2>`;

                levelData.stages.forEach(stage => {
                    if (!selectedStageIds.includes(stage.stage_id)) return;

                    const exercisesToRender = stage.exercises.filter(ex => selectedActivities.includes(ex.activity_tag));
                    if (exercisesToRender.length === 0) return; 

                    html += `<div class="stage-title">${stage.stage_title}</div>`;

                    exercisesToRender.forEach(exercise => {
                        
                        html += `<div class="exercise-block">`;
                        html += `<h2>${exercise.gym_label}</h2>`;
                        html += `<p class="instructions">${exercise.instructions}</p>`;

                        let pulledItems = shuffleArray(exercise.bank).slice(0, exercise.pull_count);
                        let keyContent = [];

                        if (exercise.type === 'notes_and_matching') {
                            html += `<div class="grammar-notes"><ul>`;
                            exercise.notes_content.forEach(note => html += `<li>${note}</li>`);
                            html += `</ul></div>`;
                            let partB_Shuffled = shuffleArray(pulledItems);
                            const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
                            html += `<div class="two-col"><ul class="col match-col">`;
                            pulledItems.forEach((item, idx) => {
                                html += `<li>___ ${idx + 1}. ${item.prompt}</li>`;
                                let matchIdx = partB_Shuffled.findIndex(e => e.answer === item.answer);
                                keyContent.push(`${idx + 1}. ${letters[matchIdx]}`);
                            });
                            html += `</ul><ul class="col match-col" style="list-style-type:none;">`;
                            partB_Shuffled.forEach((item, idx) => {
                                html += `<li><strong>${letters[idx]}.</strong> ${item.answer}</li>`;
                            });
                            html += `</ul></div>`;
                        } 
                        
                        else if (exercise.type === 'multiple_choice') {
                            pulledItems.forEach((item, index) => {
                                html += `<div class="question-item"><strong>${index + 1}.</strong> ${item.prompt}
                                    <div class="mcq-options">
                                        <span><strong>A.</strong> ${item.options.A}</span>
                                        <span><strong>B.</strong> ${item.options.B}</span>
                                        <span><strong>C.</strong> ${item.options.C}</span>
                                    </div></div>`;
                                keyContent.push(`${index + 1}. ${item.answer}`);
                            });
                        }

                        else if (exercise.type === 'error_correction') {
                            pulledItems.forEach((item, index) => {
                                let formattedPrompt = item.prompt.replace(/\*\*(.*?)\*\*/g, '<span class="clue-bold">$1</span>');
                                html += `<div class="question-item"><strong>${index + 1}.</strong> ${formattedPrompt} <span class="blank-line-med"></span></div>`;
                                keyContent.push(`${index + 1}. ${item.answer}`);
                            });
                        }

                        else if (exercise.type === 'fill_in_the_blank_sentences') {
                            pulledItems.forEach((item, index) => {
                                let promptWithBlank = item.prompt.replace('___', '<span class="blank-line"></span>');
                                html += `<div class="question-item"><strong>${index + 1}.</strong> ${promptWithBlank}</div>`;
                                keyContent.push(`${index + 1}. ${item.answer}`);
                            });
                        }

                        else if (exercise.type === 'cloze_paragraph_inline') {
                            let story = pulledItems[0];
                            let processedText = story.text.replace(/\[blank_(\d+)\]/g, () => `<span class="blank-line"></span>`);
                            html += `<div class="paragraph-text">${processedText}</div>`;
                            keyContent.push(Object.values(story.answers).join(" | "));
                        }

                        else if (exercise.type === 'cloze_paragraph_bank') {
                            let story = pulledItems[0];
                            let bankHtml = shuffleArray(story.word_bank).join(" &nbsp;&nbsp;|&nbsp;&nbsp; ");
                            html += `<div class="word-bank">${bankHtml}</div>`;
                            let processedText = story.text.replace(/\[blank_(\d+)\]/g, () => `<span class="blank-line"></span>`);
                            html += `<div class="paragraph-text">${processedText}</div>`;
                            keyContent.push(Object.values(story.answers).join(" | "));
                        }
                        
                        else if (exercise.type === 'transformation') {
                            pulledItems.forEach((item, index) => {
                                html += `<div class="question-item"><strong>${index + 1}.</strong> ${item.prompt} <br><span class="blank-line-long"></span></div>`;
                                keyContent.push(`${index + 1}. ${item.answer}`);
                            });
                        }

                        else if (exercise.type === 'open_response') {
                            pulledItems.forEach((item, index) => {
                                html += `<div class="question-item"><strong>${index + 1}.</strong> ${item.prompt} <br><span class="blank-line-long"></span></div>`;
                                keyContent.push(`${index + 1}. Respuestas variarán.`);
                            });
                        }

                        html += `</div>`; // Close exercise-block
                        masterKeyHTML += `<div class="key-section"><h3>${stage.stage_title} - ${exercise.gym_label}</h3>${keyContent.join(" | ")}</div>`;
                    });
                });

                html += `</div></div>`; // Close content-layer & page-continuous for this Level
            });
            
            // Append the Answer Key at the very end
            html += `
                <div class="page-continuous">
                    <div class="content-layer">
                        <h1 class="level-main-title">Claves de Respuestas: ${topicName}</h1>
                        ${masterKeyHTML}
                    </div>
                </div>
            `;

            app.innerHTML = html;
        }
    </script>
</body>
</html>

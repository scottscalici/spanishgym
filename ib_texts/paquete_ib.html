<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paquetes IB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #525659; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-top: 60px; }
        
        /* Control Bar */
        .control-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #333; color: white; padding: 10px 20px;
            display: flex; justify-content: center; gap: 20px; align-items: center;
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .control-bar select, .control-bar button {
            padding: 8px 16px; font-size: 1rem; border-radius: 4px; border: none; cursor: pointer;
        }
        .control-bar button { background-color: #4CAF50; color: white; font-weight: bold; transition: background 0.3s;}
        .control-bar button:hover { background-color: #45a049; }
        .control-bar button:disabled { background-color: #888; cursor: not-allowed; }

        /* The "Paper" - strictly sized to US Letter ratio for perfect PDF scaling */
        .page {
            background-color: white; 
            width: 816px; 
            min-height: 1056px; 
            margin: 20px auto; 
            padding: 96px; 
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            overflow: hidden;
        }

        .has-watermark::before {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background-image: url('https://raw.githubusercontent.com/scottscalici/spanishgym/main/images/spanishgymbw.png'); 
            background-repeat: no-repeat; background-position: center; background-size: contain;
            opacity: 0.06; z-index: 0; pointer-events: none;
        }

        .content-wrapper { position: relative; z-index: 1; }

        h1 { text-align: center; font-size: 1.3rem; margin-bottom: 2rem; line-height: 1.3; }
        h2 { font-size: 1.1rem; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 15px; margin-top: 30px;}
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.9rem; font-weight: bold; }
        .name-line { width: 200px; border-bottom: 1px solid #000; display: inline-block; margin-left: 10px; }
        
        .reading-section { display: flex; gap: 1.5rem; }
        .line-numbers { width: 30px; flex-shrink: 0; text-align: right; font-family: monospace; color: #888; }
        .line-num-slot { height: 2rem; display: flex; align-items: center; justify-content: flex-end; }
        .reading-text p { font-size: 1.1rem; line-height: 2rem; margin-bottom: 2rem; text-indent: 2rem; text-align: justify; }

        .instruction-block { background: #f0f0f0; padding: 10px; margin-bottom: 15px; font-weight: bold; border-left: 4px solid #333; }
        .options-box { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        .option-item { font-weight: bold; font-size: 0.95rem;}
        
        .question-row { margin-bottom: 15px; display: flex; align-items: baseline; gap: 10px; }
        .q-number { font-weight: bold; width: 30px; flex-shrink: 0;}
        .q-content { flex-grow: 1; }
        
        .blank-box { display: inline-block; width: 40px; height: 30px; border: 1px solid #000; text-align: center; line-height: 30px; font-weight: bold; }
        .blank-line { display: inline-block; width: 100%; border-bottom: 1px dashed #000; height: 1.5rem; }
        .mcq-options { margin-top: 5px; margin-left: 20px; }
        .mcq-option { display: block; margin-bottom: 5px;}
        
        /* Concise Answer Key */
        .answer-key-header { color: #d93025; text-align: center; font-weight: bold; font-size: 1.5rem; margin-bottom: 20px; border: 2px dashed #d93025; padding: 10px;}
        .key-text-block { margin-bottom: 30px; }
        .key-text-title { font-size: 1.1rem; font-weight: bold; background: #ffebee; color: #b71c1c; padding: 8px; margin-bottom: 15px; border-radius: 4px; }
        .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; font-family: 'Courier New', Courier, monospace; }
        .key-item { background: #f9f9f9; padding: 8px; border-left: 3px solid #d93025; }
        .key-num { font-weight: bold; display: inline-block; width: 50px; }
        .key-ans { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

    <div class="control-bar" id="ui-bar">
        <label for="set-selector"><strong>Seleccionar Paquete:</strong></label>
        <select id="set-selector">
            <option value="">Buscando archivos...</option>
        </select>
        <button id="download-btn" onclick="exportToPDF()" disabled>📥 Descargar PDF Perfecto</button>
    </div>

    <div id="document-container"></div>

    <script>
        // The GitHub API endpoint to list the contents of your ib_texts folder
        const repoApiUrl = 'https://api.github.com/repos/scottscalici/spanishgym/contents/ib_texts';

        document.addEventListener('DOMContentLoaded', () => {
            const selector = document.getElementById('set-selector');
            
            // 1. Automatically fetch the list of files from your GitHub repository
            fetch(repoApiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('No se pudo acceder al repositorio');
                    return response.json();
                })
                .then(files => {
                    // Clear the "Buscando archivos..." message
                    selector.innerHTML = '';
                    
                    // Filter out anything that isn't a .json file
                    const jsonFiles = files.filter(file => file.name.endsWith('.json'));
                    
                    if (jsonFiles.length === 0) {
                        selector.innerHTML = '<option value="">No se encontraron paquetes JSON</option>';
                        return;
                    }

                    // Dynamically create the dropdown options
                    jsonFiles.forEach(file => {
                        const option = document.createElement('option');
                        // Use the raw download URL as the value so the app can fetch the actual text
                        option.value = file.download_url; 
                        
                        // Clean up the file name to make it look nice in the dropdown
                        // Changes "ib_textos1nm.json" into "Ib textos1nm"
                        let prettyName = file.name.replace('.json', '').replace(/_/g, ' ');
                        prettyName = prettyName.charAt(0).toUpperCase() + prettyName.slice(1);
                        
                        option.textContent = prettyName;
                        selector.appendChild(option);
                    });

                    // Automatically load the very first packet in the list
                    loadWorksheetData(selector.value);

                    // Add the event listener so it updates when you select a new one
                    selector.addEventListener('change', (e) => loadWorksheetData(e.target.value));
                })
                .catch(error => {
                    console.error('Error fetching repo contents:', error);
                    selector.innerHTML = '<option value="">Error al conectar con GitHub</option>';
                });
        });

        // 2. Fetch the actual content of the selected JSON file
        function loadWorksheetData(url) {
            if (!url) return;
            
            document.getElementById('document-container').innerHTML = '<h2 style="text-align:center; margin-top:100px; color:white;">Cargando documento...</h2>';
            document.getElementById('download-btn').disabled = true;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(data => {
                    generateDocument(data);
                    document.getElementById('download-btn').disabled = false;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('document-container').innerHTML = '<h2 style="text-align:center; color:#ff4444; margin-top:100px;">Error al cargar el archivo JSON. Verifica que el formato sea correcto.</h2>';
                });
        }

        // --- RENDER FUNCTIONS ---
        function generateDocument(data) {
            const container = document.getElementById('document-container');
            container.innerHTML = ''; 
            const globalTitle = data.worksheet.title;

            data.worksheet.texts.forEach(textData => container.appendChild(createReadingPage(textData, globalTitle)));
            data.worksheet.texts.forEach(textData => container.appendChild(createQuestionPage(textData, globalTitle)));
            container.appendChild(createConciseAnswerKeyPage(data));

            setTimeout(calculateLineNumbers, 300);
        }

        function createHeader(globalTitle) {
            return `
                <div class="header">
                    <div>NOMBRE: <span class="name-line"></span></div>
                    <div>${globalTitle}</div>
                </div>`;
        }

        function createReadingPage(textData, globalTitle) {
            const page = document.createElement('div');
            page.className = 'page has-watermark'; 
            let paragraphsHtml = textData.paragraphs.map(p => `<p>${p}</p>`).join('');

            page.innerHTML = `
                <div class="content-wrapper">
                    ${createHeader(globalTitle)}
                    <h1>${textData.title}</h1>
                    <div class="reading-section">
                        <div class="line-numbers"></div>
                        <div class="reading-text">${paragraphsHtml}</div>
                    </div>
                </div>`;
            return page;
        }

        function createQuestionPage(textData, globalTitle) {
            const page = document.createElement('div');
            page.className = 'page'; 
            
            let sectionsHtml = textData.question_sections.map(section => {
                let optionsHtml = '';
                if (section.options) {
                    const opts = Object.entries(section.options).map(([key, val]) => `<span class="option-item">${key}: ${val}</span>`).join(' | ');
                    optionsHtml = `<div class="options-box">${opts}</div>`;
                }
                let questionsHtml = section.questions.map(q => renderQuestion(q, section.type)).join('');

                return `
                    <div class="instruction-block">${section.instructions}</div>
                    ${optionsHtml}
                    <div class="question-list">${questionsHtml}</div>`;
            }).join('');

            page.innerHTML = `
                <div class="content-wrapper">
                    ${createHeader(globalTitle)}
                    <h2>Preguntas: ${textData.title}</h2>
                    ${sectionsHtml}
                </div>`;
            return page;
        }

        function renderQuestion(q, type) {
            switch(type) {
                case 'matching':
                case 'fill_in_the_blank':
                    return `<div class="question-row"><div class="blank-box"></div><div class="q-number">${q.number}.</div><div class="q-content">${q.prompt}</div></div>`;
                case 'short_answer':
                case 'reference':
                case 'synonym_search':
                    return `<div class="question-row"><div class="q-number">${q.number}.</div><div class="q-content">${q.prompt}<br><div class="blank-line"></div></div></div>`;
                case 'true_false_justification':
                    return `<div class="question-row"><div class="q-number">${q.number}.</div><div class="q-content">${q.prompt} <strong>V [ &nbsp; ] &nbsp;&nbsp; F [ &nbsp; ]</strong><br>Justificación: <div class="blank-line"></div></div></div>`;
                case 'multiple_choice':
                    let optsHtml = Object.entries(q.options).map(([key, val]) => `<div class="mcq-option"><span>${key}. ${val}</span></div>`).join('');
                    return `<div class="question-row"><div class="q-number">${q.number}.</div><div class="q-content">${q.prompt}<div class="mcq-options">${optsHtml}</div></div></div>`;
                case 'multiple_select':
                    let multiBoxes = `<div class="blank-box"></div> `.repeat(5);
                    return `<div class="question-row"><div class="q-number">${q.number}.</div><div class="q-content">${q.prompt}<br><br>${multiBoxes}</div></div>`;
                default:
                    return `<div>Error: (${type})</div>`;
            }
        }

        function createConciseAnswerKeyPage(data) {
            const page = document.createElement('div');
            page.className = 'page'; 
            
            let keyContentHtml = data.worksheet.texts.map(textData => {
                let answersHtml = '';
                textData.question_sections.forEach(section => {
                    section.questions.forEach(q => {
                        let answerString = (section.type === 'true_false_justification') ? `${q.answer_boolean} (Justificación: ${q.answer_justification})` : 
                                           (section.type === 'multiple_select') ? q.answer.join(', ') : q.answer;
                        answersHtml += `<div class="key-item"><span class="key-num">${q.number}.</span> <span class="key-ans">${answerString}</span></div>`;
                    });
                });
                return `<div class="key-text-block"><div class="key-text-title">${textData.title}</div><div class="key-grid">${answersHtml}</div></div>`;
            }).join('');

            page.innerHTML = `
                <div class="content-wrapper">
                    <div class="answer-key-header">CLAVE DE RESPUESTAS (ANSWER KEY)</div>
                    ${keyContentHtml}
                </div>`;
            return page;
        }

        function calculateLineNumbers() {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                const textContainer = page.querySelector('.reading-text');
                const numbersContainer = page.querySelector('.line-numbers');
                if (textContainer && numbersContainer) {
                    numbersContainer.innerHTML = '';
                    const totalLines = Math.floor(textContainer.offsetHeight / 32);
                    for (let i = 1; i <= totalLines; i++) {
                        const numSlot = document.createElement('div');
                        numSlot.className = 'line-num-slot';
                        if (i % 5 === 0) numSlot.textContent = i;
                        numbersContainer.appendChild(numSlot);
                    }
                }
            });
        }

// --- EXACT PDF EXPORT LOGIC ---
        async function exportToPDF() {
            const btn = document.getElementById('download-btn');
            btn.innerHTML = "⏳ Generando PDF (Esto tomará unos segundos)...";
            btn.disabled = true;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', 'letter'); 
            const pages = document.querySelectorAll('.page');

            for (let i = 0; i < pages.length; i++) {
                const pageElement = pages[i];
                
                const canvas = await html2canvas(pageElement, {
                    scale: 2, 
                    useCORS: true, 
                    logging: false
                });

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                
                // --- THE FIX ---
                // We calculate the exact height to maintain the aspect ratio
                const pdfWidth = 612; // 8.5 inches in points
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                if (i > 0) pdf.addPage();
                
                // Draw the image using the calculated proportional height
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight); 
            }

            // Grabs the current text of the dropdown to name the PDF file
            const currentFileName = document.getElementById('set-selector').options[document.getElementById('set-selector').selectedIndex].text;
            pdf.save(`${currentFileName.replace(/ /g, '_')}_Spanish_Gym.pdf`);
            
            btn.innerHTML = "📥 Descargar PDF Perfecto";
            btn.disabled = false;
        }
    </script>
</body>
</html>
